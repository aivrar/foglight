name: Signed Windows Release Candidate

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: signed-windows-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-signed-candidate:
    if: github.ref == 'refs/heads/main'
    runs-on: windows-latest
    timeout-minutes: 45
    environment: release-signing

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements-build.txt
            requirements-dev.txt

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install dependencies
        run: |
          python -m pip install -r requirements-build.txt -r requirements-dev.txt
          npm ci
          npx playwright install chromium

      - name: Complete source gates
        run: |
          python -m ruff check .
          python -m pytest -q
          npm run test:js
          npm run test:browser
          python -m pip_audit -r requirements-build.txt
          npm audit --audit-level=high
          python .\scripts\scan_secrets.py --json

      - name: Import ephemeral signing certificate
        shell: pwsh
        env:
          SIGNING_PFX_BASE64: ${{ secrets.FOGLIGHT_SIGN_PFX_BASE64 }}
          SIGNING_PFX_PASSWORD: ${{ secrets.FOGLIGHT_SIGN_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SIGNING_PFX_BASE64)) {
            throw "FOGLIGHT_SIGN_PFX_BASE64 is required"
          }
          if ([string]::IsNullOrWhiteSpace($env:SIGNING_PFX_PASSWORD)) {
            throw "FOGLIGHT_SIGN_PFX_PASSWORD is required"
          }

          $pfxPath = Join-Path $env:RUNNER_TEMP "foglight-signing.pfx"
          $thumbprintsPath = Join-Path $env:RUNNER_TEMP "foglight-imported-thumbprints.txt"
          try {
            $bytes = [Convert]::FromBase64String($env:SIGNING_PFX_BASE64)
          } catch {
            throw "FOGLIGHT_SIGN_PFX_BASE64 is not valid base64"
          }
          [IO.File]::WriteAllBytes($pfxPath, $bytes)
          $password = ConvertTo-SecureString $env:SIGNING_PFX_PASSWORD -AsPlainText -Force
          $imported = @(Import-PfxCertificate -FilePath $pfxPath `
            -CertStoreLocation Cert:\CurrentUser\My -Password $password)
          $imported.Thumbprint | Set-Content -Encoding ascii $thumbprintsPath

          $codeSigningOid = "1.3.6.1.5.5.7.3.3"
          $candidates = @($imported | Where-Object {
            $certificate = $_
            $hasCodeSigningEku = @($certificate.EnhancedKeyUsageList | Where-Object {
              $_.ObjectId.Value -eq $codeSigningOid
            }).Count -gt 0
            $certificate.HasPrivateKey -and
              $certificate.NotBefore -le (Get-Date) -and
              $certificate.NotAfter -gt (Get-Date) -and
              $hasCodeSigningEku
          })
          if ($candidates.Count -ne 1) {
            throw "PFX must contain exactly one unexpired code-signing certificate with a private key"
          }
          "FOGLIGHT_SIGN_CERT_SHA1=$($candidates[0].Thumbprint)" | Out-File `
            -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Remove-Item -LiteralPath $pfxPath -Force

      - name: Build, sign, timestamp, and verify
        env:
          FOGLIGHT_TIMESTAMP_URL: ${{ secrets.FOGLIGHT_TIMESTAMP_URL }}
        run: python .\build_windows.py --require-signature

      - name: Signed packaged release profiles
        run: |
          python .\scripts\smoke_packaged_release.py --exe .\dist\Foglight.exe --port 19880 --require-live
          python .\scripts\smoke_packaged_offline.py --exe .\dist\Foglight.exe --port 19879

      - name: Verify signed artifact and checksum
        shell: pwsh
        run: |
          $signature = Get-AuthenticodeSignature .\dist\Foglight.exe
          if ($signature.Status -ne "Valid") {
            throw "Authenticode status is $($signature.Status), expected Valid"
          }
          $actual = (Get-FileHash -Algorithm SHA256 .\dist\Foglight.exe).Hash.ToLowerInvariant()
          $manifest = ((Get-Content .\dist\SHA256SUMS.txt) -split "\s+")[0].ToLowerInvariant()
          if ($actual -ne $manifest) { throw "SHA256SUMS.txt does not match Foglight.exe" }

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: foglight-windows-signed-${{ github.run_number }}
          path: |
            dist/Foglight.exe
            dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

      - name: Remove certificate material
        if: always()
        shell: pwsh
        run: |
          $thumbprintsPath = Join-Path $env:RUNNER_TEMP "foglight-imported-thumbprints.txt"
          if (Test-Path $thumbprintsPath) {
            foreach ($thumbprint in Get-Content $thumbprintsPath) {
              if ($thumbprint -match '^[A-Fa-f0-9]{40}$') {
                Remove-Item -LiteralPath "Cert:\CurrentUser\My\$thumbprint" `
                  -Force -ErrorAction SilentlyContinue
              }
            }
            Remove-Item -LiteralPath $thumbprintsPath -Force
          }
          $pfxPath = Join-Path $env:RUNNER_TEMP "foglight-signing.pfx"
          if (Test-Path $pfxPath) { Remove-Item -LiteralPath $pfxPath -Force }
